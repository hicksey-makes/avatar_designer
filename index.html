<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="css/avatar.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
  </head>
  <body>
    <div id="app"></div>
    <div class="page-content">
      <h1>Avatar Designer</h1>
      <p>Upload your image or try one of the provided options</p>
      <div class="original-image">
        <div class="square">

        </div>

      </div>
      <div class="btn-wrap">
        <button class="">Image 1</button>
        <button class="">Image 2</button>
        <button class="">Image 3</button>
      </div>
      <div class="slider-wrap">
        <p>Adjust border radius:</p>
        <input type="range"  />
      </div>
      <div class="clr-pick-wrap">
        <p>Choose border color:</p>
        <input type="color"  />
      </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
